<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Antes de empezar - Speak Easy ClearPath</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="data:,">
</head>
<body>
<div class="wrap">
<div class="brand">Speak Easy - ClearPath</div>
<div class="subtitle">Antes de empezar</div>
<div class="card">
<p>Estas preguntas no se califican -- nos ayudan a conocerte mejor y a armar tu plan de estudio y tus horarios de clase.</p>
</div>
<div class="card">
<label>¿Cuál es tu nivel de inglés, según tú?</label>
<div id="levelOptions"></div>
</div>
<div class="card">
<label>Experiencia previa estudiando inglés (puedes elegir más de una opción)</label>
<div id="experienceOptions"></div>
</div>
<div class="card">
<label>¿Hace cuánto no estudias o practicas inglés de forma regular?</label>
<div id="practiceOptions"></div>
</div>
<div class="card">
<label>¿Qué tanto usas el inglés en tu día a día?</label>
<div id="usageOptions"></div>
</div>
<div class="card">
<label>¿Cuánto tiempo en promedio puedes dedicarle al inglés por semana?</label>
<div id="hoursOptions"></div>
</div>
<div class="card">
<label>¿Qué días te quedan mejor para tus clases? (puedes elegir más de uno)</label>
<div id="daysOptions"></div>
</div>
<div class="card">
<label>¿Qué franjas horarias prefieres? Hora Colombia -- puedes elegir más de una.</label>
<div id="slotsOptions"></div>
</div>
<div class="card">
<button class="primary" id="submitBtn">Continuar al examen</button>
<p class="note" id="errorMsg" style="color:#c62828; display:none;"></p>
</div>
</div>
<script src="js/fetch-retry.js"></script>
<script type="module" src="js/app-intake.js"></script>
</body>
</html>
