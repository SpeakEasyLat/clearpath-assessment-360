<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Antes de empezar - Speak Easy ClearPath</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="data:,">
</head>
<body>
<div class="wrap">
<div class="brand">Speak Easy - ClearPath</div>
<div class="subtitle">Antes de empezar</div>
<div class="card">
<p>Estas preguntas no se califican -- nos ayudan a conocerte mejor y a armar tu plan de estudio y tus horarios de clase.</p>
</div>
<div class="card">
<label>Cual es tu nivel de ingles, segun vos?</label>
<div id="levelOptions"></div>
</div>
<div class="card">
<label>Experiencia previa estudiando ingles (podes elegir mas de una opcion)</label>
<div id="experienceOptions"></div>
</div>
<div class="card">
<label>Hace cuanto no estudias o practicas ingles de forma regular?</label>
<div id="practiceOptions"></div>
</div>
<div class="card">
<label>Que tanto usas el ingles en tu dia a dia?</label>
<div id="usageOptions"></div>
</div>
<div class="card">
<label>Cuanto tiempo en promedio podes dedicarle al ingles por semana?</label>
<div id="hoursOptions"></div>
</div>
<div class="card">
<label>Que dias te quedan mejor para tus clases? (podes elegir mas de uno)</label>
<div id="daysOptions"></div>
</div>
<div class="card">
<label>Que franjas horarias preferis? Hora Colombia -- podes elegir mas de una.</label>
<div id="slotsOptions"></div>
</div>
<div class="card">
<button class="primary" id="submitBtn">Continuar al examen</button>
<p class="note" id="errorMsg" style="color:#c62828; display:none;"></p>
</div>
</div>
<script type="module" src="js/app-intake.js"></script>
</body>
</html>
